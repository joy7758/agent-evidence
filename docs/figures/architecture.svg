<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="340" viewBox="0 0 1120 340" role="img" aria-labelledby="title desc">
  <title id="title">OpenTelemetry-to-EEOAP local architecture</title>
  <desc id="desc">Pipeline from OpenTelemetry source to trace parser, EEOAP mapper, evidence store, audit interface, and local validator.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .validator { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 8; }
      .note { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
      .label { font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 5; }
    </style>
  </defs>

  <rect class="box" x="40" y="70" width="180" height="82"/>
  <text class="label" x="130" y="105" text-anchor="middle">OpenTelemetry</text>
  <text class="small" x="130" y="130" text-anchor="middle">Collector / OTLP JSON</text>

  <rect class="box" x="270" y="70" width="150" height="82"/>
  <text class="label" x="345" y="105" text-anchor="middle">Trace Parser</text>
  <text class="small" x="345" y="130" text-anchor="middle">span normalization</text>

  <rect class="box" x="470" y="70" width="150" height="82"/>
  <text class="label" x="545" y="105" text-anchor="middle">EEOAP Mapper</text>
  <text class="small" x="545" y="130" text-anchor="middle">statement + evidence</text>

  <rect class="box" x="670" y="70" width="150" height="82"/>
  <text class="label" x="745" y="105" text-anchor="middle">Evidence Store</text>
  <text class="small" x="745" y="130" text-anchor="middle">JSON artifacts</text>

  <rect class="box" x="870" y="70" width="190" height="82"/>
  <text class="label" x="965" y="105" text-anchor="middle">Audit Interface</text>
  <text class="small" x="965" y="130" text-anchor="middle">reviewer-facing output</text>

  <rect class="validator" x="470" y="205" width="150" height="72"/>
  <text class="label" x="545" y="236" text-anchor="middle">Local Validator</text>
  <text class="small" x="545" y="258" text-anchor="middle">schema + references</text>

  <rect class="note" x="650" y="205" width="410" height="72"/>
  <text class="small" x="855" y="235" text-anchor="middle">Boundary: local validation only.</text>
  <text class="small" x="855" y="257" text-anchor="middle">No certification, non-repudiation, or deployment proof.</text>

  <path class="line" d="M 220 111 L 270 111"/>
  <path class="line" d="M 420 111 L 470 111"/>
  <path class="line" d="M 620 111 L 670 111"/>
  <path class="line" d="M 820 111 L 870 111"/>
  <path class="dash" d="M 545 152 L 545 205"/>
  <path class="dash" d="M 620 241 L 650 241"/>
  <path class="dash" d="M 620 225 C 735 170 850 170 935 152"/>
</svg>
