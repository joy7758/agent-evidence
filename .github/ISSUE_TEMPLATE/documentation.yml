name: Documentation issue
description: Report confusing, incomplete, or outdated documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link or path to the affected page/file/section.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is confusing, incomplete, or inaccurate?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested change
      description: Optional proposed wording or structure.
