name: EEOAP Protocol Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  eeoap-protocol-gate:
    name: eeoap-protocol-gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate protocol metadata
        run: |
          python -m json.tool protocol/manifest.json > /dev/null
          python -m json.tool protocol/clause-index.json > /dev/null

      - name: Run protocol citation checker
        run: python scripts/check_protocol_citations.py

      - name: Run minimal evidence profile validation
        run: agent-evidence validate-profile examples/minimal-valid-evidence.json
