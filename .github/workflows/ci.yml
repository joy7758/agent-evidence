name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    name: Lint and Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,langchain,sql]"

      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run unit tests
        run: pytest

      - name: Run profile gate
        run: python scripts/run_profile_gate.py

      - name: Run specimen gate
        run: python scripts/run_specimen_gate.py

  postgres-integration:
    name: PostgreSQL Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agent_evidence_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agent_evidence_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,langchain,postgres]"

      - name: Run PostgreSQL integration tests
        env:
          AGENT_EVIDENCE_POSTGRES_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/agent_evidence_test
        run: pytest tests/test_postgres_integration.py
