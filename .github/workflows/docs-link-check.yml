name: Docs Link Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-link-check:
    name: Check documentation links
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # This workflow checks repository-local documentation links only.
          # External citations, DOI resolvers, publisher pages, vendor docs,
          # local demo endpoints, and placeholder provider URLs can return 403,
          # 404, or time out in CI even when the cited text remains useful.
          args: >-
            --root-dir "${{ github.workspace }}"
            --no-progress
            --exclude '^https?://'
            './**/*.md'
          fail: true
