name: Docs Link Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-link-check:
    name: Check documentation links
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # These DOI resolver URLs return 403 or time out in CI even though the DOI text is valid.
          args: >-
            --root-dir "${{ github.workspace }}"
            --no-progress
            --exclude '^https://doi\.org/10\.(1145/(317087\.317089|1084805\.1084812|2076450\.2076466)|5281/zenodo\.19334061|6028/NIST\.SP\.800-162)$'
            './**/*.md'
          fail: true
